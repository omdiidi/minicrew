schema_version: 1

db:
  jobs_table: jobs
  workers_table: workers
  events_table: worker_events
  url: ${SUPABASE_URL}
  service_key: ${SUPABASE_SERVICE_ROLE_KEY}
  direct_url: ${SUPABASE_DB_URL}

worker:
  prefix: minicrew
  role: primary
  poll_interval_seconds: null

reaper:
  stale_threshold_seconds: 120
  interval_seconds: 60
  max_attempts: 3

job_types:
  summarize:
    description: "Produce a concise summary of input text."
    mode: single
    skill: null
    model: claude-sonnet-4-6
    thinking_budget: medium
    timeout_seconds: 1800
    prompt_template: summarize.md.j2
    result_filename: result.json
    idle_timeout_seconds: 900
    result_idle_timeout_seconds: 300

logging:
  level: info
  format: json
  redact_env:
    - SUPABASE_SERVICE_ROLE_KEY
    - SUPABASE_DB_URL
  sinks:
    - type: file
      path: logs/worker-{instance}.log
      rotate: daily
      keep: 30
  job_output:
    capture: true
    retention_days: 7
